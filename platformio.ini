[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; huge_app: 3MB app partition — required for BLE + WiFi + NRF stack
board_build.partitions = huge_app.csv
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    nrf24/RF24@^1.6.0
; BT flags already defined in sdkconfig — omitting to prevent redefinition warnings
